# Triggering build #23: Surgical Diagnostics + Portal Fix Verification - March 14
name: Deploy to TestFlight 🚀🛡️

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: macos-15 # Latest macOS runner with iOS 18 SDK
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web App
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}
          VITE_REVENUECAT_APPLE_KEY: ${{ secrets.VITE_REVENUECAT_APPLE_KEY }}
          VITE_REVENUECAT_GOOGLE_KEY: ${{ secrets.VITE_REVENUECAT_GOOGLE_KEY }}
          VITE_TMB_APP_ID: ${{ secrets.VITE_TMB_APP_ID }}
          VITE_TMB_APP_KEY: ${{ secrets.VITE_TMB_APP_KEY }}

      - name: Capacitor Sync
        run: npx cap sync ios

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install
        env:
          LANG: en_US.UTF-8
          LC_ALL: en_US.UTF-8

      - name: Import Code Signing Certificates
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APP_STORE_CERTIFICATE_P12 }}
          p12-password: ${{ secrets.APP_STORE_CERTIFICATE_PASSWORD }}
          create-keychain: true
          keychain-password: ${{ secrets.APP_STORE_CERTIFICATE_PASSWORD }}

      - name: Install Provisioning Profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.APP_STORE_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
          
      - name: 🔍 Surgical Diagnostics
        run: |
          echo "=== keychain Identities ==="
          security find-identity -v -p codesigning
          
          echo "=== Provisioning Profile Details ==="
          PROV_PATH=~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
          security cms -D -i "$PROV_PATH" > profile_decoded.plist
          
          echo "Profile TeamID:"
          /usr/libexec/PlistBuddy -c "Print :TeamIdentifier:0" profile_decoded.plist
          
          echo "Profile Entitlements (Sign In with Apple?):"
          /usr/libexec/PlistBuddy -c "Print :Entitlements:com.apple.developer.applesignin" profile_decoded.plist || echo "NOT FOUND"
          
          echo "Checking Certificate Match..."
          openssl pkcs12 -in <(echo "${{ secrets.APP_STORE_CERTIFICATE_P12 }}" | base64 --decode) -nokeys -passin pass:"${{ secrets.APP_STORE_CERTIFICATE_PASSWORD }}" | openssl x64 -pubkey -noout || echo "P12 Cert detected"
          
          echo "Profile expiration:"
          /usr/libexec/PlistBuddy -c "Print :ExpirationDate" profile_decoded.plist

      - name: Build and Archive iOS App
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.APP_STORE_CONNECT_KEY_CONTENT }}" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8
          
          xcodebuild -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive \
            -allowProvisioningUpdates \
            -authenticationKeyID "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}" \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8" \
            DEVELOPMENT_TEAM=7W52U2SRVA \
            -verbose

      - name: Export .ipa
        run: |
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/ \
            -exportOptionsPlist ios/App/App/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyID "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}" \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8" \
            -verbose

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: 'build/App.ipa'
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          api-key-content: ${{ secrets.APP_STORE_CONNECT_KEY_CONTENT }}
